name: 🔥 GitHub 热门项目推送到微信

on:
  schedule:
    # 北京时间每天早上 9:00 和晚上 21:00
    - cron: '0 1,13 * * *'
      timezone: 'Asia/Shanghai'
  workflow_dispatch:

jobs:
  trending-push:
    runs-on: ubuntu-latest
    steps:
      - name: 抓取近 7 天高 Star 仓库
        id: fetch
        run: |
          SINCE=$(date -d '7 days ago' -u +%Y-%m-%d)

          REPOS=$(gh search repos "created:>=$SINCE archived:false" \
            --sort stars \
            --order desc \
            --limit 10 \
            --json fullName,url,description,stargazersCount,language,forksCount \
            --jq '[.[] | {
              fullName: .fullName,
              url: .url,
              desc: (.description // "无描述")[0:80],
              stars: .stargazersCount,
              lang: (.language // "未知"),
              forks: .forksCount
            }]')

          echo "repos_json<<EOF" >> $GITHUB_OUTPUT
          echo "$REPOS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 格式化推送消息
        id: format
        run: |
          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          WEEKDAY=$(TZ='Asia/Shanghai' date +%u)
          DAYS=("日" "一" "二" "三" "四" "五" "六")
          REPOS_JSON='${{ steps.fetch.outputs.repos_json }}'

          cat > message.txt << 'MSG_HEAD'
          ## 🔥 GitHub 近期热门项目
          MSG_HEAD

          echo "**${TODAY} 周${DAYS[$WEEKDAY]}** | 近 7 天创建 · Star 飙升 TOP 10" >> message.txt
          echo "" >> message.txt

          echo "$REPOS_JSON" | jq -r '
          . as $data |
          ([range(0; ($data | length))] | map(
            "**" + ((. + 1) | tostring) + ".** [" + $data[.].fullName + "](" + $data[.].url + ")  \n" +
            "　　⭐ " + ($data[.].stars | tostring) + " 　|　 🖥 " + $data[.].lang + " 　|　 🔀 Fork " + ($data[.].forks | tostring) + "  \n" +
            "　　" + $data[.].desc + "\n"
          )) | .[]
          ' >> message.txt

          echo "" >> message.txt
          echo "---" >> message.txt
          echo "> 🤖 由 GitHub Actions 自动推送 · [查看源码](https://github.com/${{ github.repository }})" >> message.txt

          cat message.txt

          MSG_CONTENT=$(cat message.txt | jq -Rs '.')
          echo "content=$MSG_CONTENT" >> $GITHUB_OUTPUT

      - name: 推送到微信（PushPlus）
        run: |
          RESPONSE=$(curl -s -X POST "http://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d "{
              \"token\": \"${{ secrets.PUSHPLUS_TOKEN }}\",
              \"title\": \"🔥 GitHub 热门项目日报\",
              \"content\": ${{ steps.format.outputs.content }},
              \"template\": \"markdown\"
            }")

          echo "PushPlus 响应: $RESPONSE"

          CODE=$(echo "$RESPONSE" | jq -r '.code')
          if [ "$CODE" != "200" ]; then
            echo "❌ 推送失败！请检查 PUSHPLUS_TOKEN 是否正确"
            exit 1
          fi
          echo "✅ 推送成功"
